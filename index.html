<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WifiDrop - Berbagi File</title>
  
  <!-- Load Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Load React & ReactDOM (Versi Production) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Load Babel (Untuk transpile JSX langsung di browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Load PeerJS -->
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Kode React ditaruh di dalam script type="text/babel" -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Pengganti Icon dari lucide-react menggunakan SVG ---
    const Share2 = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
    );
    const FileUp = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M12 12v6"/><path d="m15 15-3-3-3 3"/></svg>
    );
    const CheckCircle2 = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
    );

    const App = () => {
      const [myId, setMyId] = useState('------');
      const [targetId, setTargetId] = useState('');
      const [status, setStatus] = useState('disconnected'); // disconnected, connecting, connected
      const [logs, setLogs] = useState(['Sistem siap.']);
      const [progress, setProgress] = useState(0);
      const [isSending, setIsSending] = useState(false);
      const [receivedFile, setReceivedFile] = useState(null);
      
      const peerRef = useRef(null);
      const connRef = useRef(null);
      const fileInputRef = useRef(null);

      // Inisialisasi PeerJS
      useEffect(() => {
        initPeer();
        return () => {
          if (peerRef.current) peerRef.current.destroy();
        };
      }, []);

      const addLog = (msg) => {
        setLogs(prev => [...prev.slice(-4), msg]);
      };

      const initPeer = () => {
        const randomPin = Math.floor(100000 + Math.random() * 900000).toString();
        const peer = new window.Peer(randomPin);
        peerRef.current = peer;

        peer.on('open', (id) => {
          setMyId(id);
          addLog(`ID Anda: ${id}`);
        });

        peer.on('connection', (conn) => {
          if (connRef.current) {
            conn.close();
            return;
          }
          handleIncomingConnection(conn);
        });

        peer.on('error', (err) => {
          addLog(`Error: ${err.type}`);
          setStatus('disconnected');
        });
      };

      const handleIncomingConnection = (conn) => {
        connRef.current = conn;
        setupConnection(conn);
      };

      const connectToPeer = () => {
        if (targetId.length !== 6) return;
        setStatus('connecting');
        addLog(`Menghubungi ${targetId}...`);
        const conn = peerRef.current.connect(targetId, { reliable: true });
        connRef.current = conn;
        setupConnection(conn);
      };

      const setupConnection = (conn) => {
        conn.on('open', () => {
          setStatus('connected');
          addLog(`Terhubung ke ${conn.peer}`);
        });

        let receiveBuffer = [];
        let fileInfo = null;

        conn.on('data', (data) => {
          if (data.type === 'header') {
            fileInfo = data;
            receiveBuffer = [];
            setIsSending(false);
            addLog(`Menerima: ${data.name}`);
          } else if (data.type === 'chunk') {
            receiveBuffer[data.current] = data.data;
            const p = Math.round(((data.current + 1) / fileInfo.total) * 100);
            setProgress(p);

            if (data.current + 1 === fileInfo.total) {
              const blob = new Blob(receiveBuffer);
              const url = URL.createObjectURL(blob);
              setReceivedFile({ name: fileInfo.name, url });
              addLog(`Selesai menerima file.`);
              setProgress(0);
            }
          }
        });

        conn.on('close', () => {
          setStatus('disconnected');
          connRef.current = null;
          addLog("Koneksi terputus.");
        });
      };

      const handleSendFile = (e) => {
        const file = e.target.files[0];
        if (!file || !connRef.current) return;

        setIsSending(true);
        const CHUNK_SIZE = 16384 * 4; // 64KB chunks
        const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
        
        connRef.current.send({
          type: 'header',
          name: file.name,
          size: file.size,
          total: totalChunks
        });

        let currentChunk = 0;
        const readChunk = () => {
          const start = currentChunk * CHUNK_SIZE;
          const end = Math.min(start + CHUNK_SIZE, file.size);
          const reader = new FileReader();
          
          reader.onload = (event) => {
            connRef.current.send({
              type: 'chunk',
              current: currentChunk,
              data: event.target.result
            });
            
            currentChunk++;
            setProgress(Math.round((currentChunk / totalChunks) * 100));

            if (currentChunk < totalChunks) {
              setTimeout(readChunk, 1);
            } else {
              addLog(`Berhasil mengirim ${file.name}`);
              setIsSending(false);
              setProgress(0);
            }
          };
          reader.readAsArrayBuffer(file.slice(start, end));
        };
        readChunk();
      };

      return (
        <div className="min-h-screen bg-slate-50 text-slate-900 p-4 md:p-8 font-sans">
          <div className="max-w-2xl mx-auto space-y-6">
            
            {/* Header */}
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-2">
                <div className="bg-indigo-600 p-2 rounded-lg">
                  <Share2 className="text-white w-5 h-5 sm:w-6 sm:h-6" />
                </div>
                <h1 className="text-lg sm:text-xl font-bold tracking-tight">WifiDrop</h1>
              </div>
              <div className={`px-3 py-1.5 rounded-full text-[10px] sm:text-xs font-medium flex items-center gap-2 ${
                status === 'connected' ? 'bg-green-100 text-green-700' : 'bg-slate-200 text-slate-600'
              }`}>
                <div className={`w-2 h-2 rounded-full ${status === 'connected' ? 'bg-green-500 animate-pulse' : 'bg-slate-400'}`} />
                {status === 'connected' ? 'Terhubung' : 'Offline'}
              </div>
            </div>

            {/* Hero Section / ID Display */}
            <div className="bg-white rounded-3xl p-6 sm:p-8 border border-slate-200 shadow-sm flex flex-col items-center text-center">
              <p className="text-slate-500 text-xs sm:text-sm font-medium mb-2 uppercase tracking-wider">PIN Perangkat Anda</p>
              <h2 className="text-4xl sm:text-5xl font-mono font-black text-indigo-600 mb-6 tracking-widest">{myId}</h2>
              
              {/* Bagian Input yang sudah dibuat responsif (flex-col di mobile, flex-row di layar lebih besar) */}
              <div className="flex flex-col sm:flex-row gap-3 sm:gap-4 w-full max-w-sm">
                <input 
                  type="text" 
                  placeholder="Masukkan PIN tujuan"
                  className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 font-mono text-center text-base sm:text-lg"
                  value={targetId}
                  onChange={(e) => setTargetId(e.target.value.replace(/\D/g,''))}
                  maxLength={6}
                />
                <button 
                  onClick={connectToPeer}
                  disabled={status === 'connected' || targetId.length !== 6}
                  className="w-full sm:w-auto whitespace-nowrap bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold hover:bg-indigo-700 disabled:opacity-50 transition-all"
                >
                  Hubungkan
                </button>
              </div>
            </div>

            {/* Main Content Area */}
            <div className={`transition-all duration-500 ${status === 'connected' ? 'opacity-100 translate-y-0' : 'opacity-40 pointer-events-none translate-y-4'}`}>
              <div className="bg-white rounded-3xl p-5 sm:p-6 border border-slate-200 shadow-sm">
                <h3 className="text-base sm:text-lg font-bold mb-4 flex items-center gap-2">
                  <FileUp className="w-5 h-5 text-indigo-500" />
                  Kirim File
                </h3>
                
                <div 
                  onClick={() => fileInputRef.current.click()}
                  className="group border-2 border-dashed border-slate-200 rounded-2xl p-6 sm:p-10 flex flex-col items-center justify-center cursor-pointer hover:border-indigo-300 hover:bg-indigo-50 transition-all text-center"
                >
                  <input type="file" className="hidden" ref={fileInputRef} onChange={handleSendFile} />
                  <div className="w-14 h-14 sm:w-16 sm:h-16 bg-slate-100 rounded-2xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                    <FileUp className="text-slate-400 group-hover:text-indigo-500 w-6 h-6 sm:w-8 sm:h-8" />
                  </div>
                  <p className="text-slate-600 font-medium text-sm sm:text-base">Klik untuk pilih file</p>
                  <p className="text-slate-400 text-xs sm:text-sm mt-1">Maksimum disarankan 100MB</p>
                </div>

                {/* Progress Bar */}
                {progress > 0 && (
                  <div className="mt-6 space-y-2">
                    <div className="flex justify-between text-xs sm:text-sm font-medium text-slate-600">
                      <span>{isSending ? 'Mengirim...' : 'Menerima...'}</span>
                      <span>{progress}%</span>
                    </div>
                    <div className="w-full bg-slate-100 rounded-full h-2.5 sm:h-3 overflow-hidden">
                      <div 
                        className="bg-indigo-600 h-full transition-all duration-200"
                        style={{ width: `${progress}%` }}
                      />
                    </div>
                  </div>
                )}
              </div>
            </div>

            {/* Received Files / Downloads */}
            {receivedFile && (
              <div className="bg-green-50 border border-green-100 rounded-2xl p-3 sm:p-4 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 sm:gap-0 animate-in fade-in slide-in-from-bottom-2 mt-6">
                <div className="flex items-center gap-3 w-full sm:w-auto overflow-hidden">
                  <CheckCircle2 className="text-green-500 w-6 h-6 flex-shrink-0" />
                  <div className="min-w-0 flex-1">
                    <p className="text-sm font-bold text-green-900 truncate" title={receivedFile.name}>{receivedFile.name}</p>
                    <p className="text-xs text-green-700">File siap diunduh</p>
                  </div>
                </div>
                <a 
                  href={receivedFile.url} 
                  download={receivedFile.name}
                  className="w-full sm:w-auto text-center bg-green-500 text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-green-600"
                >
                  Simpan
                </a>
              </div>
            )}

            {/* Logs / Debug */}
            <div className="bg-slate-900 rounded-2xl p-4 font-mono text-[9px] sm:text-[10px] text-slate-400 shadow-inner mt-6 overflow-x-auto">
              {logs.map((log, i) => (
                <div key={i} className="flex gap-2 whitespace-nowrap">
                  <span className="text-slate-600">[{new Date().toLocaleTimeString()}]</span>
                  <span>{log}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
